<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: white;
        font-family: Georgia;
    }
    
    /* Hide pages */
    .page-screen {
        display: none;
    }
    
    /* Show active page */
    .active {
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
    /* Book Cover */
    .book {
        width: 300px;
        height: 420px;
        cursor: pointer;
    }
    
    .cover {
        width: 100%;
        height: 100%;
        position: relative;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 0 30px red, 0 20px 40px rgba(0,0,0,0.6);
    }
    
    .cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(1.3) contrast(1.2);
    }
    
    .cover::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.4);
    }
    
    .title {
        position: absolute;
        top: 40px;
        width: 100%;
        text-align: center;
        color: #ff1a1a;
        font-size: 20px;
        z-index: 2;
    }
    
    .author {
        position: absolute;
        bottom: 20px;
        right: 15px;
        color: white;
        font-size: 14px;
        z-index: 2;
    }
    
    /* Story Pages */
    .page {
        width: 300px;
        min-height: 420px;
        border: 5px solid black;
        border-radius: 10px;
        padding: 30px;
        box-sizing: border-box;
        position: relative;
        
        background: linear-gradient(#f5f5f5, #dcdcdc);
        box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
        overflow: hidden;
    }
    
    /* 🔥 SHAKE ANIMATION */
    @keyframes shake {
        0% { transform: translateX(0); }
        20% { transform: translateX(-4px); }
        40% { transform: translateX(4px); }
        60% { transform: translateX(-4px); }
        80% { transform: translateX(4px); }
        100% { transform: translateX(0); }
    }
    
    /* Apply animation on hover */
    .page:hover {
        animation: shake 0.3s ease;
    }
    
    /* Blood effect */
    .page::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 20% 10%, rgba(139,0,0,0.6), transparent 40%),
                    radial-gradient(circle at 80% 70%, rgba(139,0,0,0.5), transparent 40%),
                    radial-gradient(circle at 50% 90%, rgba(100,0,0,0.4), transparent 40%);
    }
    
    /* Title */
    .story-title {
        text-align: center;
        font-size: 16px;
        color: #8b0000;
        margin-bottom: 20px;
    }
    
    /* Text */
    .story-text {
        font-size: 10px;
        line-height: 1.6;
        text-align: justify;
    }
    
    /* Ending */
    .ending {
        text-align: center;
        font-size: 11px;
        color: #8b0000;
        margin-top: 20px;
        font-style: italic;
    }
    
    /* Buttons */
    .btn {
        position: absolute;
        bottom: 15px;
        padding: 8px 16px;
        background: black;
        color: white;
        border: none;
        cursor: pointer;
    }
    
    .back-btn { left: 20px; }
    .next-btn { right: 20px; }
    </style>
